# based from https://docs.gitea.com/installation/install-with-docker#basics


# version: "3"

# networks:
#   gitea:
#     external: false

services:
  server:
    image: docker.gitea.com/gitea:1.25.5
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: unless-stopped
    volumes:
      - /home/homelab-admin/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"

  runner:                                          # ← add this
    image: gitea/act_runner:latest
    container_name: gitea-runner
    restart: unless-stopped
    depends_on:
      - server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/homelab-admin/gitea-runner:/data     # ← same pattern as Gitea
    environment:
      - GITEA_INSTANCE_URL=https://git.home.lab/
      - GITEA_RUNNER_REGISTRATION_TOKEN=${GITEA_RUNNER_REGISTRATION_TOKEN}
      - GITEA_RUNNER_NAME=debian-vm-runner
