# based from https://docs.paperless-ngx.com/setup/

# Docker Compose file for running paperless from the docker container registry.
# This file contains everything paperless needs to run.
# Paperless supports amd64, arm and arm64 hardware.
#
# All compose files of paperless configure paperless in the following way:
#
# - Paperless is (re)started on system boot, if it was running before shutdown.
# - Docker volumes for storing data are managed by Docker.
# - Folders for importing and exporting files are created in the same directory
#   as this file and mounted to the correct folders inside the container.
# - Paperless listens on port 8000.
#
# In addition to that, this Docker Compose file adds the following optional
# configurations:
#
# - Instead of SQLite (default), PostgreSQL is used as the database server.
# - Apache Tika and Gotenberg servers are started with paperless and paperless
#   is configured to use these services. These provide support for consuming
#   Office documents (Word, Excel, PowerPoint and their LibreOffice counter-
#   parts).
#
# To install and update paperless with this file, do the following:
#
# - Copy this file as 'docker-compose.yml' and the files 'docker-compose.env'
#   and '.env' into a folder.
# - Run 'docker compose pull'.
# - Run 'docker compose up -d'.
#
# For more extensive installation and update instructions, refer to the
# documentation.
services:
  broker:
    image: docker.io/library/redis:8
    container_name: paperless-redis
    restart: unless-stopped
    user: 1000:1000
    volumes:
      - /home/homelab-admin/paperless/data:/data
  db:
    image: docker.io/library/postgres:18
    container_name: paperless-postgres
    restart: unless-stopped
    user: 1000:1000
    volumes:
      - /home/homelab-admin/paperless/db:/var/lib/postgresql
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${PAPERLESS_DB_PASSWORD}
  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    restart: unless-stopped
    depends_on:
      - db
      - broker
      - gotenberg
      - tika
    ports:
      - 8010:8000
    volumes:
      - /home/homelab-admin/paperless/data:/usr/src/paperless/data
      - /home/homelab-admin/paperless/media:/usr/src/paperless/media
      - /home/homelab-admin/paperless/export:/usr/src/paperless/export
      - /home/homelab-admin/paperless/consume:/usr/src/paperless/consume
    # env_file: docker-compose.env
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      USERMAP_UID: 1000
      USERMAP_GID: 1000
      PAPERLESS_TIME_ZONE: Europe/Berlin
      PAPERLESS_OCR_LANGUAGE: deu+eng
      PAPERLESS_OCR_LANGUAGES: deu eng
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
      PAPERLESS_FILENAME_FORMAT: "{{ created_year }}/{{ correspondent }}/{{ title }}"
      PAPERLESS_URL: https://paperless.home.lab
      
  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.25
    container_name: paperless-gotenberg
    restart: unless-stopped
    # The gotenberg chromium route is used to convert .eml files. We do not
    # want to allow external content like tracking pixels or even javascript.
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
  tika:
    image: docker.io/apache/tika:latest
    container_name: paperless-tika
    restart: unless-stopped

  pdf-translate-webhook:
    image: ghcr.io/home-lab/pdf-translate-paperless-webhook:latest
    container_name: pdf-translate-webhook
    ports:
      - "8082:8081"
    volumes:
      - /home/homelab-admin/paperless/pdf-translate-webhook:/data
    environment:
      # Paperless connection
      PAPERLESS_URL: http://paperless-ngx:8000
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN}        # in .env (secret)
      # Translation pipeline
      PDF_TRANSLATE_URL: https://pdf-translate.home.lab
      TRANSLATE_SOURCE_LANG: de               # e.g. de, fr, nl — or "auto"
      TRANSLATE_TARGET_LANG: en
      TRANSLATE_OUTPUT: sbs                           # pdf | sbs | both
      TRANSLATE_TIMEOUT: "300"
      TRANSLATE_LOG_FILE: /data/translate.log
      # pdf-translate API settings
      LIBRETRANSLATE_URL: https://translate.home.lab
      PDF_TRANSLATE_SERVICE: LibreTranslate
      PDF_TRANSLATE_LIBRE_URL: https://translate.home.lab
      PDF_TRANSLATE_LIBRE_KEY:
      PDF_TRANSLATE_OLLAMA_URL: https://ollama.home.lab
      PDF_TRANSLATE_OLLAMA_MODEL: translategemma:latest
      PDF_TRANSLATE_OLLAMA_KEY:
      PDF_TRANSLATE_MERGE_BLOCKS: false
      PDF_TRANSLATE_FORCE_OCR: false
      PDF_TRANSLATE_ALLOW_WRAP: false
      PDF_TRANSLATE_FILTER_ICONS: true
      PDF_TRANSLATE_DETECT_TABLES: true
    restart: unless-stopped
    depends_on:
      - paperless-ngx

  # based from https://github.com/icereed/paperless-gpt?tab=readme-ov-file#docker-compose

  paperless-gpt:
    # Use one of these image sources:
    image: icereed/paperless-gpt:latest # Docker Hub
    # image: ghcr.io/icereed/paperless-gpt:latest  # GitHub Container Registry
    container_name: paperless-gpt
    environment:
      PAPERLESS_BASE_URL: "http://paperless-ngx:8000"
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN}
      PAPERLESS_PUBLIC_URL: https://paperless.home.lab # Optional
      MANUAL_TAG: "paperless-gpt" # Optional, default: paperless-gpt
      AUTO_TAG: "paperless-gpt-auto" # Optional, default: paperless-gpt-auto
      # LLM Configuration - Choose one:

      # Option 1: Standard OpenAI
      # LLM_PROVIDER: "openai"
      # LLM_MODEL: "gpt-4o"
      # OPENAI_API_KEY: "your_openai_api_key"

      # Option 2: Mistral
      # LLM_PROVIDER: "mistral"
      # LLM_MODEL: "mistral-large-latest"
      # MISTRAL_API_KEY: "your_mistral_api_key"

      # Option 3: Azure OpenAI
      # LLM_PROVIDER: "openai"
      # LLM_MODEL: "your-deployment-name"
      # OPENAI_API_KEY: "your_azure_api_key"
      # OPENAI_API_TYPE: "azure"
      # OPENAI_BASE_URL: "https://your-resource.openai.azure.com"

      # Option 4: Ollama (Local)
      LLM_PROVIDER: "ollama"
      LLM_MODEL: "gemma3:latest"
      OLLAMA_HOST: http://192.168.xx.xx:11434
      OLLAMA_CONTEXT_LENGTH: "8192" # Sets Ollama NumCtx (context window)
      TOKEN_LIMIT: 1000 # Recommended for smaller models

      # Option 5: Anthropic/Claude
      # LLM_PROVIDER: "anthropic"
      # LLM_MODEL: "claude-sonnet-4-5"
      # LLM_API_KEY_1: "your_anthropic_api_key"

      # Optional LLM Settings
      # LLM_LANGUAGE: "English" # Optional, default: English

      # OCR Configuration - Choose one:
      # Option 1: LLM-based OCR
      OCR_PROVIDER: "llm" # Default OCR provider
      VISION_LLM_PROVIDER: "ollama" # openai, ollama, mistral, or anthropic
      VISION_LLM_MODEL: "minicpm-v" # minicpm-v (ollama) or gpt-4o (openai) or claude-sonnet-4-5 (anthropic/claude)
      # OLLAMA_HOST: "http://host.docker.internal:11434" # If using Ollama

      # OCR Processing Mode
      OCR_PROCESS_MODE: "image" # Optional, default: image, other options: pdf, whole_pdf
      PDF_SKIP_EXISTING_OCR: "false" # Optional, skip OCR for PDFs with existing OCR

      # Option 2: Google Document AI
      # OCR_PROVIDER: 'google_docai'       # Use Google Document AI
      # GOOGLE_PROJECT_ID: 'your-project'  # Your GCP project ID
      # GOOGLE_LOCATION: 'us'              # Document AI region
      # GOOGLE_PROCESSOR_ID: 'processor-id' # Your processor ID
      # GOOGLE_APPLICATION_CREDENTIALS: '/app/credentials.json' # Path to service account key

      # Option 3: Azure Document Intelligence
      # OCR_PROVIDER: 'azure'              # Use Azure Document Intelligence
      # AZURE_DOCAI_ENDPOINT: 'your-endpoint' # Your Azure endpoint URL
      # AZURE_DOCAI_KEY: 'your-key'        # Your Azure API key
      # AZURE_DOCAI_MODEL_ID: 'prebuilt-read' # Optional, defaults to prebuilt-read
      # AZURE_DOCAI_TIMEOUT_SECONDS: '120'  # Optional, defaults to 120 seconds
      # AZURE_DOCAI_OUTPUT_CONTENT_FORMAT: 'text' # Optional, defaults to 'text', other valid option is 'markdown'
      # 'markdown' requires the 'prebuilt-layout' model

      # Enhanced OCR Features
      CREATE_LOCAL_HOCR: "true" # Optional, save hOCR files locally
      LOCAL_HOCR_PATH: "/app/hocr" # Optional, path for hOCR files
      CREATE_LOCAL_PDF: "true" # Optional, save enhanced PDFs locally
      LOCAL_PDF_PATH: "/app/pdf" # Optional, path for PDF files
      PDF_UPLOAD: "false" # Optional, upload enhanced PDFs to paperless-ngx
      PDF_REPLACE: "false" # Optional and DANGEROUS, delete original after upload
      PDF_COPY_METADATA: "true" # Optional, copy metadata from original document
      PDF_OCR_TAGGING: "true" # Optional, add tag to processed documents
      PDF_OCR_COMPLETE_TAG: "paperless-gpt-ocr-complete" # Optional, tag name

      # Option 4: Docling Server
      # OCR_PROVIDER: 'docling'              # Use a Docling server
      # DOCLING_URL: 'http://your-docling-server:port' # URL of your Docling instance
      # DOCLING_IMAGE_EXPORT_MODE: "placeholder" # Optional, defaults to "embedded"
      # DOCLING_OCR_PIPELINE: "standard" # Optional, defaults to "vlm"
      # DOCLING_OCR_ENGINE: "easyocr" # Optional, defaults to "easyocr" (only used when `DOCLING_OCR_PIPELINE is set to 'standard')


      AUTO_OCR_TAG: "paperless-gpt-ocr-auto" # Optional, default: paperless-gpt-ocr-auto
      OCR_LIMIT_PAGES: "5" # Optional, default: 5. Set to 0 for no limit.
      LOG_LEVEL: "info" # Optional: debug, warn, privateor
    volumes:
      - /home/homelab-admin/paperless/paperless-gpt/prompts:/app/prompts # Mount the prompts directory
      # For Google Document AI:
      # - ${HOME}/.config/gcloud/application_default_credentials.json:/app/credentials.json
      # For local hOCR and PDF saving:
      - /home/homelab-admin/paperless/paperless-gpt/hocr:/app/hocr # Only if CREATE_LOCAL_HOCR is true
      - /home/homelab-admin/paperless/paperless-gpt/pdf:/app/pdf # Only if CREATE_LOCAL_PDF is true
    ports:
      - 8081:8080
    depends_on:
      - paperless-ngx
    restart: unless-stopped

  # based from https://github.com/clusterzx/paperless-ai/wiki/2.-Installation

  paperless-ai:
    image: clusterzx/paperless-ai
    container_name: paperless-ai
    # network_mode: bridge
    restart: unless-stopped
    # cap_drop:
    #   - ALL
    # security_opt:
    #   - no-new-privileges=true
    environment:
      - PUID=1000
      - PGID=1000
      - PAPERLESS_AI_PORT=3000
      - RAG_SERVICE_URL=https://paperless.home.lab
      - RAG_SERVICE_ENABLED=true
    ports:
      - 3100:3000
    volumes:
      - /home/homelab-admin/paperless/paperless-ai:/app/data
    depends_on:
      - paperless-ngx

