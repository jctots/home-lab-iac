#based from https://github.com/open-webui/open-webui/blob/main/docker-compose.yaml

services:
  ollama:
    image: ollama/ollama:latest
    container_name: local-ai-ollama
    restart: unless-stopped
    volumes:
      - /home/homelab-admin/local-ai/ollama:/root/.ollama
    ports:
      - 11434:11434
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_QUEUE=10
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: local-ai-open-webui
    depends_on:
      - ollama
    ports:
      - 3000:8080
    volumes:
      - /home/homelab-admin/local-ai/open-webui:/app/backend/data
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

  # n8n+postgres: https://github.com/n8n-io/n8n-hosting/blob/main/docker-compose/withPostgres/docker-compose.yml

  postgres:
    image: postgres:16
    restart: unless-stopped
    container_name: local-ai-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=n8n
    user: 1000:1000
    expose:
      - 5432
    volumes:
      - /home/homelab-admin/local-ai/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U postgres -d n8n']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n
    container_name: local-ai-n8n
    ports:
      - 5678:5678
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_HOST=clementi.ts.net.private
      - N8N_PORT=5678
      - N8N_EDITOR_BASE_URL=https://clementi.ts.net.private
      - WEBHOOK_URL=https://clementi.ts.net.private/
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_PROXY_HOPS=2 # 1st: tailscale funnel, 2nd: ngnix reverse proxy
      - N8N_PROTOCOL=https # needed for correct webhook URLs when behind a reverse proxy
      - N8N_EXPRESS_TRUST_PROXY=true
    volumes:
      - /home/homelab-admin/local-ai/n8n:/home/node/.n8n
      - /home/homelab-admin/local-ai/n8n-workflow-data:/home/node/.n8n-files
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant
    container_name: local-ai-qdrant
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - /home/homelab-admin/local-ai/qdrant:/qdrant/storage
