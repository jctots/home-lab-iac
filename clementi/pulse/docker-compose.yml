# based from https://github.com/rcourtman/Pulse/blob/main/docker-compose.yml

version: '3.8'

services:
  pulse:
    image: rcourtman/pulse:latest
    container_name: pulse
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - 7655:7655
    user: 1000:1000
    volumes:
      - /home/homelab-admin/pulse:/data
      # Temperature monitoring:
      # - Recommended (v5): install pulse-agent on each Proxmox host with --enable-proxmox.
      # - Deprecated: pulse-sensor-proxy (host-side proxy). If you already use it, mount the socket read-only.
      # - /run/pulse-sensor-proxy:/run/pulse-sensor-proxy:ro
    environment:
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7655/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
