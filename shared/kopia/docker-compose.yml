#based from https://kopia.io/docs/installation/

version: '3.7'
services:
    kopia:
        image: kopia/kopia:latest
        # hostname: Hostname
        container_name: kopia
        restart: unless-stopped
        ports:
            - 51515:51515
        # Setup the server that provides the web gui
        command:
            - server
            - start
            - --disable-csrf-token-checks
            - --insecure
            - --address=0.0.0.0:51515
            - --server-username=homelab-admin
            - --server-password=${KOPIA_SERVER_PASSWORD}
        environment:
            # Set repository password
            KOPIA_PASSWORD: ${KOPIA_PASSWORD}
            USER: "homelab-admin"
            TZ: Europe/Berlin
        volumes:
            # Mount local folders needed by kopia
            - /home/homelab-admin/kopia/config:/app/config
            - /home/homelab-admin/kopia/cache:/app/cache
            - /home/homelab-admin/kopia/logs:/app/logs
            # Mount local folders to snapshot
            - /home/homelab-admin:/data:ro
            # Mount repository location
            - /home/homelab-admin/kopia/repository:/repository
            # Mount path for browsing mounted snaphots
            - /home/homelab-admin/kopia/tmp:/tmp:shared
